{% extends 'admin/_layout.html' %}
{% block title %}Login Admin | Aurora Makes{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="auth-card">
    <h1>Entrar no admin</h1>
    <p>Acesse com a empresa e credenciais autorizadas.</p>
    <form method="post" action="{{ url_for('admin.admin_login_post', next=request.args.get('next')) }}" class="auth-form">
      <label>Empresa
        <input type="text" name="company" required placeholder="empresa-slug">
      </label>
      <label>E-mail
        <input type="text" name="email" required placeholder="admin@auroramakes.com">
      </label>
      <label>Senha
        <input type="password" name="password" required placeholder="••••••••">
      </label>
      <button type="submit" class="btn">Entrar com segurança</button>
    </form>
  </div>
</section>
{% endblock %}
